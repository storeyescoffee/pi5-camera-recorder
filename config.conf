# Raspberry Pi Video Recorder Configuration
# CAMERA (analog-gain, shutter-speed, bitrate, flip), RECORDING (s3-location, chunk-duration),
# REGISTER (delta-time), BROKER, AWS, MAIL: loaded from API/cache/settings.json

[camera]
# Video resolution
resolution_width = 1920
resolution_height = 1080
# Frames per second
fps = 25

# IMX500 AI Camera (only used when running with --imx500)
# Default model matches Picamera2 IMX500 object detection demo.
imx500_model = /usr/share/imx500-models/imx500_network_efficientdet_lite0_pp.rpk
# Detection threshold (0..1). Lower if you don't see boxes.
imx500_threshold = 0.3

[recording]
# Local storage path for temporary files
local_storage_path = ./recordings
# Video naming pattern - available placeholders:
# {year}, {month}, {day}, {hour}, {minute}, {second}, {timestamp}
video_naming_pattern = chuck_00_{year}{month}{day}_{hour}{minute}{second}.mp4
# Delete local file after successful upload (true/false)
delete_after_upload = True
# Maximum number of concurrent uploads (Python: ThreadPoolExecutor + urllib3 pool)
max_concurrent_uploads = 2
# urllib3 pool size passed to boto3 (default scales with max_concurrent_uploads — avoid CLOSE-WAIT on many sockets)
# s3_pool_connections = 32
# After each failed boto upload_file(), wait min(initial * 2^attempt-1, cap) + jitter seconds before retry
# upload_retry_backoff_initial_sec = 2
# upload_retry_backoff_cap_sec = 120
# CSV file for tracking failed uploads (retried on startup and periodically)
pending_uploads_csv = ./pending_uploads.csv
# How often to retry pending uploads while running, in minutes (0 = only on startup)
pending_retry_interval_minutes = 10
# Seconds to wait after stop_recording to allow pipeline buffers to release (default: 1.5)
post_stop_delay_seconds = 1.5
# Reinitialize camera every N recordings to prevent pipeline fatigue (0 = disabled)
periodic_camera_reinit_recordings = 0
# FFmpeg video input thread_queue_size (raise if seeing "Thread message queue blocking" warnings)
ffmpeg_video_thread_queue_size = 512
# Set true to record with official rpicam-vid (libcamera) instead of Python PiCamera2 — recommended on Pi 5 for MP4 timing and to avoid the Python process holding the camera. Requires: rpicam-vid in PATH (package rpicam-apps). Incompatible with --imx500.
use_rpicam_vid = false
# rpicam_vid_path = /usr/bin/rpicam-vid
# h264 = default; use libav if you need the libav container path for bitrate/codec issues
# rpicam_codec = h264
# Extra rpicam-vid args (one line, shell-style)
# rpicam_extra_args = --low-latency

# Yield main thread briefly after each successful segment (seconds, 0 = off). Helps CPU when clips are tiny.
# main_loop_yield_seconds = 0

[api]
# Device gateway base URL (optional). If set, POST/PUT main-video state to backend.
# Example: https://panel.storeyes.io
base_url = https://panel.storeyes.io/api
# Device ID for MQTT sync-settings topic: storeyes/<device_id>/sync-settings
# If empty, auto-detected from Raspberry Pi serial (proc/cpuinfo)
device_id =
# Video URL base for POST body (optional). If set, videoUrl = video_url_base + "/" + s3_key.
# Otherwise: https://{bucket}.s3.{region}.amazonaws.com/{s3_key}
video_url_base =

[gcs]
# bucket_location from RECORDING.s3-location; fallbacks below if API/cache unavailable
# AWS credentials are automatically retrieved from:
# - Environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
# - IAM role (if running on EC2/ECS/Lambda)
# - ~/.aws/credentials file
# No need to specify access_key or secret_key here
endpoint_url = https://s3.amazonaws.com
bucket_name = storeyes-videos
region = us-east-1
